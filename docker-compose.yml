services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - PORT=8080
    networks:
      - typist-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - typist-net

networks:
  typist-net:
    driver: bridge
